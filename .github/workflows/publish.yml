name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Check release tag matches package version
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Release tag ($TAG) does not match package.json version ($VERSION)." >&2
            exit 1
          fi

      - name: Publish to npm
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not set — skipping publish." >&2
            exit 1
          fi
          LOCAL="$(node -p "require('./package.json').version")"
          PUBLISHED="$(npm view @postzen/node version 2>/dev/null || echo 'none')"
          echo "local=$LOCAL published=$PUBLISHED"
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "Version $LOCAL already published — skipping."
            exit 0
          fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
